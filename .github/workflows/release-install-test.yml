name: Release Install Test

on:
  release:
    types: [published]
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to test (example: v0.1.3)"
        required: true

permissions:
  contents: read

jobs:
  install-linux:
    name: Install, update, uninstall user-service test on Linux
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            release)
              tag="${{ github.event.release.tag_name }}"
              ;;
            workflow_dispatch)
              tag="${{ github.event.inputs.tag }}"
              ;;
            workflow_run)
              tag="$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep '^v' | head -n1 || true)"
              if [ -z "${tag}" ]; then
                echo "error: no v* tag found for workflow_run sha ${{ github.event.workflow_run.head_sha }}" >&2
                exit 1
              fi
              ;;
            *)
              echo "error: unsupported event ${{ github.event_name }}" >&2
              exit 1
              ;;
          esac

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Run release install flow
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.tag }}"
          repo="${{ github.repository }}"
          bash scripts/test-release-install-flow.sh \
            --repo "${repo}" \
            --tag "${tag}" \
            --script-ref "${tag}"
