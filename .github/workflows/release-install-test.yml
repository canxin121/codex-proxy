name: Release Install Test

on:
  release:
    types: [published]
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to test (example: v0.1.0)"
        required: true

permissions:
  contents: read

jobs:
  install-linux:
    name: Install, update, uninstall smoke test on Linux
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            release)
              tag="${{ github.event.release.tag_name }}"
              ;;
            workflow_dispatch)
              tag="${{ github.event.inputs.tag }}"
              ;;
            workflow_run)
              tag="$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | grep '^v' | head -n1 || true)"
              if [ -z "${tag}" ]; then
                echo "error: no v* tag found for workflow_run sha ${{ github.event.workflow_run.head_sha }}" >&2
                exit 1
              fi
              ;;
            *)
              echo "error: unsupported event ${{ github.event_name }}" >&2
              exit 1
              ;;
          esac

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Install from tagged script
        id: install
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.tag }}"
          repo="${{ github.repository }}"
          install_root="$(mktemp -d)"
          bin_dir="${install_root}/bin"
          share_dir="${install_root}/share"
          data_dir="${install_root}/data"
          port=18787
          log_file="${install_root}/install.log"

          echo "Using install root: ${install_root}"
          curl -fsSL "https://raw.githubusercontent.com/${repo}/${tag}/scripts/install.sh" \
            | bash -s -- \
                --repo "${repo}" \
                --version "${tag}" \
                --install-bin-dir "${bin_dir}" \
                --install-share-dir "${share_dir}/codex-proxy" \
                -- \
                --bind "127.0.0.1:${port}" \
                --data-dir "${data_dir}" \
                --admin-password "test-admin-password" | tee "${log_file}"

          grep -q "x86_64-unknown-linux-musl" "${log_file}"
          grep -q "saved runtime args:" "${log_file}"
          grep -q -- "--admin-password" "${share_dir}/codex-proxy/runtime-args.sh"

          echo "install_root=${install_root}" >> "$GITHUB_OUTPUT"
          echo "bin_path=${bin_dir}/codex-proxy" >> "$GITHUB_OUTPUT"
          echo "ui_dist=${share_dir}/codex-proxy/ui/dist" >> "$GITHUB_OUTPUT"
          echo "data_dir=${data_dir}" >> "$GITHUB_OUTPUT"
          echo "port=${port}" >> "$GITHUB_OUTPUT"

      - name: Verify installed files
        shell: bash
        run: |
          set -euo pipefail
          test -x "${{ steps.install.outputs.bin_path }}"
          test -x "${{ steps.install.outputs.install_root }}/share/codex-proxy/bin/codex-proxy"
          test -f "${{ steps.install.outputs.ui_dist }}/index.html"
          test -f "${{ steps.install.outputs.install_root }}/share/codex-proxy/install-metadata.env"
          test -f "${{ steps.install.outputs.install_root }}/share/codex-proxy/runtime-args.sh"

      - name: Verify release has musl artifact
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.tag }}"
          repo="${{ github.repository }}"
          musl_url="https://github.com/${repo}/releases/download/${tag}/codex-proxy-${tag}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsI "${musl_url}" >/dev/null

      - name: Verify explicit gnu install path works
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.tag }}"
          repo="${{ github.repository }}"
          install_root="$(mktemp -d)"
          bin_dir="${install_root}/bin"
          share_dir="${install_root}/share"
          data_dir="${install_root}/data"
          log_file="${install_root}/install-gnu.log"

          curl -fsSL "https://raw.githubusercontent.com/${repo}/${tag}/scripts/install.sh" \
            | bash -s -- \
                --repo "${repo}" \
                --version "${tag}" \
                --target "x86_64-unknown-linux-gnu" \
                --install-bin-dir "${bin_dir}" \
                --install-share-dir "${share_dir}/codex-proxy" \
                -- \
                --bind "127.0.0.1:18788" \
                --data-dir "${data_dir}" \
                --admin-password "test-admin-password" | tee "${log_file}"

          grep -q "x86_64-unknown-linux-gnu" "${log_file}"
          test -x "${bin_dir}/codex-proxy"
          test -x "${share_dir}/codex-proxy/bin/codex-proxy"
          test -f "${share_dir}/codex-proxy/ui/dist/index.html"

      - name: Verify update script works
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.tag }}"
          repo="${{ github.repository }}"
          install_root="${{ steps.install.outputs.install_root }}"
          bin_dir="${install_root}/bin"
          share_dir="${install_root}/share/codex-proxy"
          log_file="${install_root}/update.log"

          curl -fsSL "https://raw.githubusercontent.com/${repo}/${tag}/scripts/update.sh" \
            | bash -s -- \
                --repo "${repo}" \
                --version "${tag}" \
                --script-ref "${tag}" \
                --install-bin-dir "${bin_dir}" \
                --install-share-dir "${share_dir}" | tee "${log_file}"

          grep -q "Updating codex-proxy using" "${log_file}"
          grep -q "Reusing runtime args:" "${log_file}"
          test -x "${bin_dir}/codex-proxy"
          test -x "${share_dir}/bin/codex-proxy"
          test -f "${share_dir}/ui/dist/index.html"
          test -f "${share_dir}/install-metadata.env"
          test -f "${share_dir}/runtime-args.sh"

      - name: Smoke run service
        shell: bash
        run: |
          set -euo pipefail
          bin="${{ steps.install.outputs.bin_path }}"
          port="${{ steps.install.outputs.port }}"
          data_dir="${{ steps.install.outputs.data_dir }}"

          mkdir -p "${data_dir}"
          "${bin}" >"${data_dir}/server.log" 2>&1 &
          pid=$!

          cleanup() {
            if kill -0 "$pid" >/dev/null 2>&1; then
              kill "$pid" >/dev/null 2>&1 || true
              wait "$pid" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          for _ in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:${port}/healthz" >/dev/null; then
              break
            fi
            sleep 0.5
          done

          curl -fsS "http://127.0.0.1:${port}/healthz" >/dev/null
          curl -fsS "http://127.0.0.1:${port}/readyz" >/dev/null
          curl -fsS "http://127.0.0.1:${port}/" | grep -qi "<html"

      - name: Verify uninstall script works
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.vars.outputs.tag }}"
          repo="${{ github.repository }}"
          install_root="${{ steps.install.outputs.install_root }}"
          bin_dir="${install_root}/bin"
          share_dir="${install_root}/share/codex-proxy"
          data_dir="${{ steps.install.outputs.data_dir }}"
          log_file="${install_root}/uninstall.log"

          curl -fsSL "https://raw.githubusercontent.com/${repo}/${tag}/scripts/uninstall.sh" \
            | bash -s -- \
                --install-bin-dir "${bin_dir}" \
                --install-share-dir "${share_dir}" \
                --remove-data-dir | tee "${log_file}"

          grep -q "Uninstalled codex-proxy." "${log_file}"
          test ! -e "${bin_dir}/codex-proxy"
          test ! -d "${share_dir}"
          test ! -e "${data_dir}"
